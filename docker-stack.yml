services:
  traefik:
    # Pinned to the exact patch release rather than floating v3.6. A floating
    # tag bit us once already (see docs/session11-ops-debug.md, bug 1) when
    # the Docker engine's minimum API version was silently bumped and the
    # Traefik SDK couldn't negotiate. Bump this manually when we want the
    # next patch release; don't let Docker pull it behind our back.
    image: traefik:v3.6.13
    command:
      - "--providers.swarm=true"
      - "--providers.swarm.exposedByDefault=false"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
      - "--entryPoints.simulator.address=:8080"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=devtroopers@itu.dk"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Access logs to stdout. Promtail tails container logs, so these flow
      # into Loki automatically. Without this, debugging a forward hang is
      # blind (see bug 3 in docs/session11-ops-debug.md).
      - "--accesslog=true"
    # Host-mode publishing: bypass Docker Swarm's ingress mesh (IPVS + VXLAN).
    # Traefik is pinned to the manager via placement constraint below, so there
    # is no benefit to ingress routing — and ingress mesh has a known failure
    # mode where HTTP/2 connections from clients 504 after 30s because of MTU
    # interactions with the overlay network. Host mode binds these ports
    # directly on the manager's NIC. See docs/session11-ops-debug.md for the
    # full diagnosis.
    ports:
      - { mode: host, target: 80,   published: 80,   protocol: tcp }
      - { mode: host, target: 443,  published: 443,  protocol: tcp }
      - { mode: host, target: 8080, published: 8080, protocol: tcp }
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt-data:/letsencrypt
    networks:
      - frontend
    deploy:
      placement:
        constraints: [node.role == manager]

  webserver:
    image: ghcr.io/devtroopers-itu/minitwit:latest
    networks:
      - frontend
      - backend
    secrets:
      - database_url
      - secret_key
    deploy:
      replicas: 3
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        # webserver is attached to two overlay networks: `minitwit_frontend`
        # (shared with Traefik) and `minitwit_backend` (shared with postgres,
        # prometheus, etc. — NOT shared with Traefik). Without this label,
        # Traefik's Swarm provider picks whichever task IP comes first in the
        # task spec, which lands on the backend network and is unreachable,
        # producing a 30s hang on every request.
        - "traefik.swarm.network=minitwit_frontend"
        # Traefik v3.6's Swarm provider will NOT auto-link a router to a
        # service when the service definition has more than one named
        # loadbalancer. Since we publish both the web UI (443) and the
        # simulator API (8080) from this same container, we declare two
        # router/service pairs and wire each router to its service
        # explicitly with the `.service=` label.
        - "traefik.http.routers.minitwit.rule=Host(`devtroopersminitwit.codes`)"
        - "traefik.http.routers.minitwit.entrypoints=websecure"
        - "traefik.http.routers.minitwit.tls.certresolver=letsencrypt"
        - "traefik.http.routers.minitwit.service=minitwit"
        - "traefik.http.services.minitwit.loadbalancer.server.port=8080"
        - "traefik.http.routers.minitwit-sim.rule=PathPrefix(`/`)"
        - "traefik.http.routers.minitwit-sim.entrypoints=simulator"
        - "traefik.http.routers.minitwit-sim.service=minitwit-sim"
        - "traefik.http.services.minitwit-sim.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: ghcr.io/devtroopers-itu/minitwit-prometheus:latest
    networks:
      - backend
    volumes:
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
      placement:
        constraints: [node.role == manager]

  grafana:
    image: ghcr.io/devtroopers-itu/minitwit-grafana:latest
    networks:
      - frontend
      - backend
    secrets:
      - discord_webhook_url
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.devtroopersminitwit.codes/
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=minitwit_frontend"
        - "traefik.http.routers.grafana.rule=Host(`grafana.devtroopersminitwit.codes`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  loki:
    image: grafana/loki:3.6.7
    volumes:
      - loki-data:/loki
    configs:
      - source: loki_config
        target: /etc/loki/local-config.yaml
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  promtail:
    image: grafana/promtail:3.6.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    configs:
      - source: promtail_config
        target: /etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend
    deploy:
      mode: global

networks:
  frontend:
    driver: overlay
  backend:
    driver: overlay

volumes:
  prometheus-data:
  loki-data:
  letsencrypt-data:

configs:
  loki_config:
    file: ./monitoring/loki/loki-config.yml
  promtail_config:
    file: ./monitoring/promtail/promtail-config.yml

secrets:
  database_url:
    external: true
  secret_key:
    external: true
  discord_webhook_url:
    external: true
