name: CD

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          docker build -t ghcr.io/devtroopers-itu/minitwit:latest .
          docker build -t ghcr.io/devtroopers-itu/minitwit-prometheus:latest ./monitoring/prometheus
          docker build -t ghcr.io/devtroopers-itu/minitwit-grafana:latest ./monitoring/grafana
          docker push ghcr.io/devtroopers-itu/minitwit:latest
          docker push ghcr.io/devtroopers-itu/minitwit-prometheus:latest
          docker push ghcr.io/devtroopers-itu/minitwit-grafana:latest

      - name: Deploy to Swarm (DigitalOcean)
        uses: appleboy/ssh-action@v1
        with:
          host: 64.226.116.162
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          script: |
            cd /root/itu-minitwit
            git pull origin master
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stack deploy -c docker-stack.yml minitwit --with-registry-auth

      - name: Deploy to Hetzner (legacy)
        uses: appleboy/ssh-action@v1
        with:
          host: 46.224.144.214
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,POSTGRES_PASSWORD,SECRET_KEY,DISCORD_WEBHOOK_URL
          script: |
            cd /root/itu-minitwit
            echo "DATABASE_URL=$DATABASE_URL" > .env
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
            echo "SECRET_KEY=$SECRET_KEY" >> .env
            echo "DISCORD_WEBHOOK_URL=$DISCORD_WEBHOOK_URL" >> .env
            git pull origin master
            docker compose build
            docker compose pull
            docker compose up -d || docker compose logs webserver
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
