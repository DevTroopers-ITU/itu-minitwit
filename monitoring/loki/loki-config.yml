# No multi-tenant auth needed - we're the only team using this
auth_enabled: false

# Loki's HTTP API - Promtail pushes to this, Grafana queries from this
server:
  http_listen_port: 3100

# Storage settings - where Loki keeps log data on disk
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# How Loki organizes its index - daily rotation using BoltDB
schema_config:
  configs:
    - from: "2020-10-24"
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

# Reject logs older than 7 days to keep disk usage under control
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: false
