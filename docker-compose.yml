services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: minitwit
      POSTGRES_USER: minitwit
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "minitwit"]
      interval: 5s
      retries: 3

  webserver:
    build: .
    image: ghcr.io/devtroopers-itu/minitwit:latest
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://minitwit:${DB_PASSWORD}@db:5432/minitwit?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - minitwit-db:/tmp
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  minitwit-db:
